name: Release Windows and Android Application

on: 
  push: 
    branches:
    - '**'
  workflow_dispatch: 
  
jobs:
  get-version: 
    name: Storing the current version of the application
    runs-on: ubuntu-latest  
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Gets the version from package.json
        id: version
        run: |
          # Extracts the version field and saves it to a step output
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT


  create-android-apk: 
    name: Creating the apk file for the android release 
    needs: [get-version]
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v5

      - name: Setting up the Node.js environment
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'yarn'

      - name: Enabling corepack and setting yarn to the most stable version
        run: |
          corepack enable
          yarn set version stable

      - name: Installing the application's dependencies
        run: yarn install

      - name: Adding sv-router's generated routes file
        run: yarn run generate-routes

      - name: Downloading Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setting up the Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools build-tools;34.0.0"
      
      - name: Installing SDK, build-tools, NDK and verifying apksigner's existence
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"
          # Add build-tools to PATH to ensure apksigner is available
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH
          # Verify apksigner is available
          which apksigner || echo "apksigner not found in PATH"
          apksigner --version || echo "apksigner not executable"

      - name: Export the NDK_HOME variable for future use
        run: echo "NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV

      - name: Setting up the Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Initialising android application using Tauri
        run: yarn tauri android init

      - name: Decoding the signing keystore
        shell: bash
        run: |
          set -euo pipefail
          # Check if the secret exists and is not empty
          if [ -z "${{ secrets.ANDROID_RELEASE_KEY }}" ]; then
            echo "Error: ANDROID_KEYSTORE secret is empty or not set."
            echo "Please ensure the ANDROID_KEYSTORE secret is configured with a base64-encoded keystore file."
            exit 1
          fi
          # Decode the keystore
          echo "${{ secrets.ANDROID_RELEASE_KEY }}" | base64 -d > docket-release-key.keystore
          # Verify keystore was created and has content
          if [ ! -s docket-release-key.keystore ]; then
            echo "Error: Keystore file is empty or was not created."
            echo "This usually means the base64 string in ANDROID_KEYSTORE secret is invalid."
            exit 1
          fi
          # Show keystore info for debugging (without revealing sensitive data)
          echo "Keystore file created successfully:"
          ls -la docket-release-key.keystore
          file docket-release-key.keystore

      - name: Writing the signing config
        shell: bash
        run: |
          cd src-tauri/gen/android
          {
            echo "storeFile=$GITHUB_WORKSPACE/docket-release-key.keystore"
            echo "password=${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}"
            echo "keyAlias=${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}"
          } > keystore.properties

      - name: Create application 
        uses: tauri-apps/tauri-action@97cef2bd32ead607bcc2c6af5b40ce2f25d48e77
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_TAURI_APP_ID: ${{ secrets.FIREBASE_TAURI_APP_ID }}
            VITE_FIREBASE_TAURI_MEASUREMENT_ID: ${{ secrets.FIREBASE_TAURI_MEASUREMENT_ID }}
        with:
          tagName: ${{ needs.get-version.outputs.version }}
          releaseName: 'draft for ${{ needs.get-version.outputs.version }}'
          releaseBody: 'this is an autogenerated release for ${{ needs.get-version.outputs.version }} using github actions, please test and write a message before publish'
          releaseDraft: true
          prerelease: false
          mobile: android

  create-windows-msi: 
    name: Creating the .msi file for the windows release
    needs: [get-version]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setting up the application's node modules
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'yarn'
      
      - name: Enabling corepack and setting yarn to the most stable version
        run: |
          corepack enable
          yarn set version stable

      - name: Installing dependencies using yarn
        run: yarn install --frozen-lockfile

      - name: Adding sv-router's generated routes file
        run: yarn run generate-routes

      - name: Installing a stable version of Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create application 
        uses: tauri-apps/tauri-action@97cef2bd32ead607bcc2c6af5b40ce2f25d48e77
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_TAURI_APP_ID: ${{ secrets.FIREBASE_TAURI_APP_ID }}
            VITE_FIREBASE_TAURI_MEASUREMENT_ID: ${{ secrets.FIREBASE_TAURI_MEASUREMENT_ID }}
        with:
          tagName: ${{ needs.get-version.outputs.version }}
          releaseName: 'draft for ${{ needs.get-version.outputs.version }}'
          releaseBody: 'this is an autogenerated release, please test and write a message before publish'
          releaseDraft: true
          prerelease: false