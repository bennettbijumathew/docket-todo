name: Release Windows and Android Application


on: 
  pull_request: 
    branches:
      - 'main'
    types:
      - closed
  workflow_dispatch: 
  

jobs:
  release-applications: 
    name: Creating a release for the ${{ matrix.platform }} application
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ${{ matrix.runner-type }}
    strategy: 
      fail-fast: false 
      matrix: 
        include: 
          - platform: 'android'
            args: '--apk'
            runner-type: 'ubuntu-latest'
            mobile-type: 'android'

          - platform: 'windows'
            args: '--bundles msi'
            runner-type: 'windows-latest'
            mobile-type: ''
    
    steps: 
      # REPOSITORY CHECKOUT
      - name: Checking out the repository at the current moment
        uses: actions/checkout@v5

      - name: Extracting application's version from package.json
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # NODE AND YARN SETUP
      - name: Setting up the Node.js environment
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'yarn'

      - name: Enabling corepack and setting yarn to the most stable version
        run: |
          corepack enable
          yarn set version stable

      - name: Installing the application's dependencies
        run: yarn install --immutable

      - name: Adding sv-router's generated routes file
        run: yarn run generate-routes
      
      # RUST SETUP 
      - name: Setting up the Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          # Pre-install Android targets only on the Android runner
          targets: ${{ matrix.platform == 'android' && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || '' }}
      
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          # Separate cache keys per platform so they don't overwrite each other
          key: ${{ matrix.platform }}

      # SETUP FOR ONLY ANDROID 
      - name: Downloading Java 17 (ANDROID ONLY)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setting up the Android SDK & NDK (ANDROID ONLY)
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v4
        with:
          packages: >-
            tools
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;29.0.14206865

      - name: Adding build-tools to path and verifying apksigner (ANDROID ONLY)
        if: matrix.platform == 'android'
        run: |
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH
          apksigner --version

      - name: Exporting the NDK_HOME variable for the other steps (ANDROID ONLY)
        if: matrix.platform == 'android'
        run: echo "NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
      
      - name: Caching Gradle (Android only)
        if: matrix.platform == 'android'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Decoding the signing keystore (ANDROID ONLY)
        if: matrix.platform == 'android'
        shell: bash
        run: |
          set -euo pipefail
          # Check if the secret exists and is not empty
          if [ -z "${{ secrets.ANDROID_RELEASE_KEY }}" ]; then
            echo "Error: ANDROID_KEYSTORE secret is empty or not set."
            echo "Please ensure the ANDROID_KEYSTORE secret is configured with a base64-encoded keystore file."
            exit 1
          fi
          # Decode the keystore
          echo "${{ secrets.ANDROID_RELEASE_KEY }}" | base64 -d > docket-release-key.keystore
          # Verify keystore was created and has content
          if [ ! -s docket-release-key.keystore ]; then
            echo "Error: Keystore file is empty or was not created."
            echo "This usually means the base64 string in ANDROID_KEYSTORE secret is invalid."
            exit 1
          fi

      - name: Writing the signing config (ANDROID ONLY)
        if: matrix.platform == 'android'
        shell: bash
        run: |
          cd src-tauri/gen/android
          {
            echo "storeFile=$GITHUB_WORKSPACE/docket-release-key.keystore"
            echo "password=${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}"
            echo "keyAlias=${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}"
          } > keystore.properties
      
      # BUILD AND RELEASE
      - name: Creating and releasing the application for ${{ matrix.platform }} 
        uses: tauri-apps/tauri-action@97cef2bd32ead607bcc2c6af5b40ce2f25d48e77 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_TAURI_APP_ID: ${{ secrets.FIREBASE_TAURI_APP_ID }}
          VITE_FIREBASE_TAURI_MEASUREMENT_ID: ${{ secrets.FIREBASE_TAURI_MEASUREMENT_ID }}
        with:
          tagName: '${{ env.VERSION }}'
          releaseName: 'draft for ${{ env.VERSION }}'
          releaseBody: 'this is an autogenerated release for ${{ env.VERSION }} using github actions, please tag the release and write a message before publish'
          releaseAssetNamePattern: 'docket-${{ env.VERSION }}-${{ matrix.platform }}-[arch].[bundle]'
          releaseDraft: true
          prerelease: false
          mobile: ${{ matrix.mobile-type }}
          args: ${{ matrix.args }}