name: Check for Complete Package Build

on: 
  pull_request: 
    branches:
    - '**'
  push: 
    branches:
    - '**'
  workflow_dispatch: 
  
jobs: 
  build: 
    name: Building and testing the application's frontend package.
    runs-on: ubuntu-latest

    steps:
      - name: Checking out the repository at the current moment
        uses: actions/checkout@v5

      - name: Enabling corepack and setting yarn to the most stable version
        run: |
          corepack enable
          yarn set version stable

      - name: Setting up the application's node modules
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'yarn'

      - name: Installing dependencies using yarn
        run: yarn install --immutable

      - name: Adding sv-router's generated routes file
        run: yarn run generate-routes
        
      - name: Checking types and building the window's application
        run: yarn run build

      - name: Setting up the Java 21 Environment
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verifying the Java version
        run: |
          java -version
          echo $JAVA_HOME

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - name: Installing Firebase Tools for upcoming tests
        run: npm install -g firebase-tools

      - name: Running the application's tests
        run: 
          yarn run ci-test
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_TAURI_APP_ID: ${{ secrets.FIREBASE_TAURI_APP_ID }}
          VITE_FIREBASE_TAURI_MEASUREMENT_ID: ${{ secrets.FIREBASE_TAURI_MEASUREMENT_ID }}
          VITE_FIRESTORE_PLANNER_DB: ${{ secrets.FIRESTORE_PLANNER_DB }}
          VITE_FIRESTORE_TASK_DB: ${{ secrets.FIRESTORE_TASK_DB }}