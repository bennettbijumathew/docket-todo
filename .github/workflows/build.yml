name: Complete Build Check

on: 
  pull_request: 
    branches:
    - '**'
  workflow_dispatch: 
  
jobs: 
  build: 
    name: buidling the android application
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: setting up the node modules
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: installing dependencies using yarn
        run: yarn
